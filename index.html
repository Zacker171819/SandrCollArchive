<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandrini YTP — Archive</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: radial-gradient(circle at top, #04102a 0%, #010513 70%);
        color: #cfe6ff;
        font-family: "Poppins", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    header {
        text-align: center;
        margin-top: 40px;
    }

    header h1 {
        font-size: 64px;
        font-weight: 800;
        color: #4da6ff;
        letter-spacing: 3px;
        margin: 0;
    }

    header h2 {
        font-size: 22px;
        font-weight: 600;
        color: #8fbfff;
        margin-top: 5px;
        letter-spacing: 1px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
        gap: 35px;
        padding: 50px 20px;
        width: 100%;
        max-width: 1400px;
    }

    .card {
        background: #0a1a3a;
        border: 1px solid rgba(77,166,255,0.3);
        box-shadow: 0 0 25px rgba(0,100,255,0.15);
        cursor: pointer;
        transition: transform 0.2s ease;
    }

    .card:hover {
        transform: translateY(-4px);
    }

    .card video {
        width: 100%;
        aspect-ratio: 16/9;
        object-fit: cover;
        background: #000;
        border-radius: 0;

        /* THE FIX */
        pointer-events: none;
    }

    .card-title {
        text-align: center;
        font-size: 20px;
        font-weight: 700;
        color: #b8d9ff;
        padding: 14px 0 18px;
    }

    .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 10, 30, 0.92);
        z-index: 9999;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .modal video {
        width: 90%;
        max-width: 1000px;
        border: 2px solid #4da6ff;
        background: #000;
    }

    .close {
        position: absolute;
        top: 25px;
        right: 35px;
        font-size: 40px;
        color: #4da6ff;
        cursor: pointer;
        font-weight: bold;
    }

    footer {
        text-align: center;
        font-size: 12px;
        color: #6b8fbf;
        padding: 30px 10px;
        border-top: 1px solid rgba(77,166,255,0.2);
        width: 100%;
    }
</style>
</head>

<body>

<header>
    <h1>SANDRINI</h1>
    <h2>YTP — ARCHIVE</h2>
</header>

<section class="grid">

    <div class="card" data-src="https://github.com/Zacker171819/SandrCollArchive/raw/refs/heads/main/Sandrini%20ytp%20full%20collab.mp4">
        <video>
            <source src="https://github.com/Zacker171819/SandrCollArchive/raw/refs/heads/main/Sandrini%20ytp%20full%20collab.mp4">
        </video>
        <div class="card-title">Full Collab</div>
    </div>

    <div class="card" data-src="https://github.com/Zacker171819/SandrCollArchive/raw/refs/heads/main/Sandrini%20ytp%20incanza%20spiaggia.mp4">
        <video>
            <source src="https://github.com/Zacker171819/SandrCollArchive/raw/refs/heads/main/Sandrini%20ytp%20incanza%20spiaggia.mp4">
        </video>
        <div class="card-title">Incanza Spiaggia</div>
    </div>

    <div class="card" data-src="https://github.com/Zacker171819/SandrCollArchive/raw/refs/heads/main/Sandrux%20ytp.mp4">
        <video>
            <source src="https://github.com/Zacker171819/SandrCollArchive/raw/refs/heads/main/Sandrux%20ytp.mp4">
        </video>
        <div class="card-title">Sandrux YTP</div>
    </div>

    <div class="card" data-src="https://github.com/Zacker171819/SandrCollArchive/raw/refs/heads/main/ytp%20Sandrini%20-%20Obbligatorio%20soffrire.mp4">
        <video>
            <source src="https://github.com/Zacker171819/SandrCollArchive/raw/refs/heads/main/ytp%20Sandrini%20-%20Obbligatorio%20soffrire.mp4">
        </video>
        <div class="card-title">Obbligatorio Soffrire</div>
    </div>

</section>

<div class="modal" id="videoModal">
    <span class="close" id="closeBtn">&times;</span>
    <video controls id="modalVideo"></video>
</div>

<footer>
    Sandrini YTP Archive — Tutti i diritti riservati ai rispettivi autori
</footer>

<script>
    const cards = document.querySelectorAll('.card');
    const modal = document.getElementById('videoModal');
    const modalVideo = document.getElementById('modalVideo');
    const closeBtn = document.getElementById('closeBtn');

    cards.forEach(card => {
        card.addEventListener('click', () => {
            modal.style.display = 'flex';
            modalVideo.src = card.getAttribute('data-src');
            modalVideo.play();
        });
    });

    closeBtn.onclick = () => {
        modal.style.display = 'none';
        modalVideo.pause();
        modalVideo.src = "";
    };

    window.onclick = e => {
        if (e.target === modal) {
            modal.style.display = 'none';
            modalVideo.pause();
            modalVideo.src = "";
        }
    };
</script>

</body>
</html>
