<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SANDRINI YTP — Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a08;
    --surface: #111110;
    --card: #191917;
    --border: #2a2a27;
    --accent: #e8c84a;
    --accent-dim: #b89a30;
    --text: #f0ede0;
    --muted: #888880;
    --overlay-bg: rgba(0,0,0,0.88);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.35;
  }

  header {
    padding: 4rem 2rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 10vw, 7rem);
    letter-spacing: 0.04em;
    line-height: 0.9;
    color: var(--accent);
  }

  .logo span {
    display: block;
    color: var(--text);
    font-size: 0.35em;
    letter-spacing: 0.2em;
  }

  .header-meta {
    text-align: right;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    line-height: 1.8;
  }

  main {
    padding: 3rem 2rem 5rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1.5rem;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
  }

  .card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
  }

  .card:hover .play-btn {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  .card:hover .thumb-overlay {
    opacity: 1;
  }

  .thumb-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #111;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .thumb-placeholder {
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
      45deg,
      #151513,
      #151513 10px,
      #111110 10px,
      #111110 20px
    );
    opacity: 0.8;
  }

  .thumb-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.3);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.85);
    width: 52px;
    height: 52px;
    border: 2px solid var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    background: rgba(0,0,0,0.6);
  }

  .play-btn svg {
    fill: var(--accent);
    width: 20px;
    height: 20px;
    margin-left: 3px;
  }

  .card-body {
    padding: 1rem 1rem 1.2rem;
    border-top: 1px solid var(--border);
  }

  .card-index {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.05em;
    line-height: 1.1;
    color: var(--text);
  }

  .card-tag {
    margin-top: 0.6rem;
    display: inline-block;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    padding: 2px 8px;
  }

  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--overlay-bg);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  #lightbox.active {
    display: flex;
  }

  #lightbox-inner {
    width: 100%;
    max-width: 900px;
    position: relative;
    animation: popIn 0.2s ease-out;
  }

  @keyframes popIn {
    from { transform: scale(0.94); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  #lightbox-inner video {
    width: 100%;
    display: none;
    background: #000;
    outline: none;
  }

  #lightbox-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 0;
    gap: 1rem;
  }

  #lightbox-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.08em;
    color: var(--accent);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #lightbox-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.45rem 0.9rem;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    flex-shrink: 0;
  }

  #lightbox-close:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  #lb-loading {
    display: none;
    padding: 3rem 0;
    text-align: center;
    font-size: 0.75rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
  }

  #lb-loading .dots::after {
    content: '';
    animation: dots 1.2s steps(4, end) infinite;
  }

  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem 2rem;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    Sandrini<span>YTP — Archive</span>
  </div>
  <div class="header-meta">
    4 video<br>
    Collab · Cuts · Edits<br>
    Click to watch
  </div>
</header>

<main>
  <div class="grid" id="grid"></div>
</main>

<div id="lightbox">
  <div id="lightbox-inner">
    <div id="lightbox-bar">
      <div id="lightbox-title"></div>
      <button id="lightbox-close" onclick="closeLightbox()">✕ chiudi</button>
    </div>
    <div id="lb-loading"><span class="dots">Caricamento</span></div>
    <video id="lightbox-video" controls playsinline></video>
  </div>
</div>

<footer>Sandrini YTP Archive — tutti i diritti riservati ai rispettivi autori</footer>

<script>
const videos = [
  {
    file: "https://github.com/Zacker171819/SandrCollArchive/raw/refs/heads/main/Sandrini%20ytp%20full%20collab.mp4",
    title: "Full Collab",
    tag: "Collab"
  },
  {
    file: "https://github.com/Zacker171819/SandrCollArchive/raw/refs/heads/main/Sandrini%20ytp%20incanza%20spiaggia.mp4",
    title: "Incanza Spiaggia",
    tag: "Edit"
  },
  {
    file: "https://github.com/Zacker171819/SandrCollArchive/raw/refs/heads/main/Sandrux%20ytp.mp4",
    title: "Sandrux YTP",
    tag: "Cut"
  },
  {
    file: "https://github.com/Zacker171819/SandrCollArchive/raw/refs/heads/main/ytp%20Sandrini%20-%20Obbligatorio%20soffrire.mp4",
    title: "Obbligatorio Soffrire",
    tag: "YTP"
  }
];

const blobCache = {};
const grid = document.getElementById('grid');

videos.forEach((v, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="thumb-wrap">
      <div class="thumb-placeholder"></div>
      <div class="thumb-overlay"></div>
      <div class="play-btn">
        <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      </div>
    </div>
    <div class="card-body">
      <div class="card-index">№ ${String(i+1).padStart(2,'0')}</div>
      <div class="card-title">${v.title}</div>
      <span class="card-tag">${v.tag}</span>
    </div>
  `;
  card.addEventListener('click', () => openLightbox(v.file, v.title));
  grid.appendChild(card);
});

const lightbox = document.getElementById('lightbox');
const lbVideo  = document.getElementById('lightbox-video');
const lbTitle  = document.getElementById('lightbox-title');
const lbLoading = document.getElementById('lb-loading');

async function openLightbox(url, title) {
  lbTitle.textContent = title;
  lbVideo.style.display = 'none';
  lbVideo.src = '';
  lbLoading.style.display = 'block';
  lbLoading.style.color = 'var(--accent)';
  lbLoading.innerHTML = '<span class="dots">Caricamento</span>';
  lightbox.classList.add('active');

  try {
    let blobUrl = blobCache[url];
    if (!blobUrl) {
      const resp = await fetch("https://corsproxy.io/?" + encodeURIComponent(url));
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const blob = await resp.blob();
      blobUrl = URL.createObjectURL(blob);
      blobCache[url] = blobUrl;
    }
    lbLoading.style.display = 'none';
    lbVideo.src = blobUrl;
    lbVideo.style.display = 'block';
    lbVideo.play();
  } catch (err) {
    lbLoading.innerHTML = '⚠ Errore nel caricamento del video';
    lbLoading.style.color = '#e05555';
    console.error(err);
  }
}

function closeLightbox() {
  lightbox.classList.remove('active');
  lbVideo.pause();
  lbVideo.src = '';
  lbVideo.style.display = 'none';
  lbLoading.style.display = 'none';
}

lightbox.addEventListener('click', (e) => {
  if (e.target === lightbox) closeLightbox();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeLightbox();
});
</script>
</body>
</html>
